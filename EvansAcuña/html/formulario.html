<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/formulario.css">
</head>
<body>
    <header>
        <h1>Formulario</h1>
    </header>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="mi_historia.html">Mi historia</a>
        <a href="formulario.html">Formulario</a>
        <a href="mis_suenos.html">Mis sueños</a>
    </nav>
    <main>
        <section>
            <h2>Formulario de contacto</h2>
            <form>
                <article>
                    <label> Nombre Completo</label>
                    <input type="text" placeholder="Su nombre completo">
                </article>
                <article>
                    <label>Correo electronico</label>
                    <input type="email" placeholder="ejemplo@correo.com">
                </article>
                <article>
                    <label>Motivo</label>
                    <select>
                        <option>Consulta</option>
                        <option>Sugerencia</option>
                        <option>Otro</option>
                    </select>
                </article>
                <article id="art-mensaje">
                    <label >Mensaje</label>
                    <textarea id="mensaje" type="text" placeholder="Escriba su mensaje aqui"></textarea>
                </article>
                <article>
                    <button type="submit">Enviar mensaje</button>
                </article>
            </section>
        </form>
    </main>
    <footer>
        <p>Creado por: Evans A.</p>
    </footer>
</body>
</html>
